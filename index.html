<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERJAYD SHOP 🛒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
:root{--blue:#0ea5e9;--dark:#0f1419;--light:#7dd3fc;--gold:#facc15;--red:#ef4444;--green:#22c55e}
body{background:var(--dark);color:var(--light);min-height:100vh}

/* HEADER */
.header{background:rgba(14,165,233,.1);border-bottom:2px solid var(--blue);padding:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.logo{font-size:1.5rem;font-weight:bold;text-shadow:0 0 10px var(--blue)}
.nav{display:flex;gap:.5rem;flex-wrap:wrap}
.nav button{background:transparent;border:1px solid var(--blue);color:var(--light);padding:.5rem 1rem;border-radius:4px;cursor:pointer;transition:.3s}
.nav button:hover{background:var(--blue);color:var(--dark)}
.user-info{color:var(--gold);font-size:.9rem;display:flex;align-items:center;gap:.5rem}

/* CONTAINER */
.container{max-width:1200px;margin:2rem auto;padding:0 1rem}
.tab-menu{display:flex;gap:1rem;margin-bottom:1.5rem;border-bottom:1px solid #333;padding-bottom:1rem}
.tab-btn{background:transparent;border:none;color:#888;padding:.5rem 1rem;cursor:pointer;font-size:1rem}
.tab-btn.active{color:var(--blue);border-bottom:2px solid var(--blue)}
.tab-content{display:none}
.tab-content.active{display:block}

/* PRODUCTS GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem}
.card{background:rgba(255,255,255,.05);border:1px solid var(--blue);border-radius:8px;padding:1rem;transition:.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 0 15px var(--blue)}
.card h3{color:var(--gold);margin-bottom:.5rem}
.card p{font-size:.9rem;opacity:.8}
.price{font-size:1.2rem;font-weight:bold;color:var(--gold);margin:1rem 0}
.add-btn{width:100%;background:var(--blue);color:var(--dark);border:none;padding:.7rem;border-radius:4px;font-weight:bold;cursor:pointer;transition:.3s}
.add-btn:hover{box-shadow:0 0 10px var(--blue)}

/* ADMIN PANEL */
.admin-form{background:rgba(255,255,255,.05);border:1px solid var(--gold);border-radius:8px;padding:1.5rem;margin-bottom:2rem}
.admin-form h3{color:var(--gold);margin-bottom:1rem}
.admin-form input, .admin-form textarea{width:100%;padding:.7rem;margin:.5rem 0;background:rgba(255,255,255,.1);border:1px solid var(--blue);color:white;border-radius:4px}
.admin-form button{padding:.7rem 1.5rem;border:none;border-radius:4px;font-weight:bold;cursor:pointer;margin-top:.5rem}
.btn-add{background:var(--green);color:white}
.btn-delete{background:var(--red);color:white}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100}
.modal-content{background:var(--dark);border:2px solid var(--blue);padding:2rem;border-radius:8px;width:90%;max-width:420px}
.modal-content h2{margin-bottom:1rem;color:var(--gold);text-align:center}
.modal-content input{width:100%;padding:.7rem;margin:.5rem 0;background:rgba(255,255,255,.1);border:1px solid var(--blue);color:white;border-radius:4px}
.modal-content button{width:100%;padding:.7rem;margin-top:.5rem;border:none;border-radius:4px;font-weight:bold;cursor:pointer;border-radius:4px}
.btn-primary{background:var(--blue);color:var(--dark)}
.btn-secondary{background:#333;color:white}
.btn-google{background:#ea4335;color:white;display:flex;align-items:center;justify-content:center;gap:.5rem}
.divider{text-align:center;margin:1rem 0;color:#666}

/* HIDDEN */
.hidden{display:none !important}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🛡️ CYBERJAYD SHOP</div>
  <div class="nav">
    <span class="user-info" id="userStatus">Guest</span>
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Create Account</button>
    <button id="adminBtn" class="hidden">Admin Panel</button>
    <button id="logoutBtn" class="hidden">Logout</button>
  </div>
</div>

<div class="container">
  <!-- USER VIEW -->
  <div id="userView" class="tab-content active">
    <h2 style="margin-bottom:1.5rem;text-shadow:0 0 8px var(--blue)">📦 Available Products</h2>
    <div class="grid" id="productList"></div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="adminView" class="tab-content hidden">
    <h2 style="margin-bottom:1.5rem;text-shadow:0 0 8px var(--gold)">⚙️ ADMIN DASHBOARD</h2>
    
    <div class="admin-form">
      <h3>➕ Add New Product</h3>
      <input type="text" id="prodName" placeholder="Product Name">
      <textarea id="prodDesc" placeholder="Description" rows="3"></textarea>
      <input type="text" id="prodPrice" placeholder="Price e.g. ₱199">
      <button class="btn-add" onclick="addProduct()">Add Product</button>
    </div>

    <h3 style="margin-bottom:1rem">📋 Product List</h3>
    <div class="grid" id="adminProductList"></div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h2>🔐 Login</h2>
    <input type="email" id="loginEmail" placeholder="Email Address">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="btn-primary" onclick="login()">Sign In</button>
    <div class="divider">OR</div>
    <button class="btn-google" onclick="loginWithGoogle()">🔵 Sign in with Google</button>
    <button class="btn-secondary" onclick="closeModal('loginModal')">Close</button>
  </div>
</div>

<!-- Register Modal -->
<div class="modal" id="registerModal">
  <div class="modal-content">
    <h2>📝 Create New Account</h2>
    <input type="text" id="regName" placeholder="Full Name">
    <input type="email" id="regEmail" placeholder="Email Address">
    <input type="password" id="regPass" placeholder="Password (min 6 chars)">
    <button class="btn-primary" onclick="register()">Sign Up</button>
    <div class="divider">OR</div>
    <button class="btn-google" onclick="loginWithGoogle()">🔵 Sign up with Google</button>
    <button class="btn-secondary" onclick="closeModal('registerModal')">Close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== SUPABASE CONFIG =====
const SUPABASE_URL = "https://kjyvjjesqvykyveeggfz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqeXZqamVzcXZ5a3l2ZWVnZ2Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NDU0NDQsImV4cCI6MjEwMDMyMTQ0NH0.VCnsshbB86MgOolatcb2s0R45uBgkZ5SEUUS4iQlJ08";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ADMIN EMAIL (ILAGAY MO ANG EMAIL MO DITO)
const ADMIN_EMAIL = "repoberbiojayd3@gmail.com";

// DEFAULT PRODUCTS
let products = [
  {id:1, name:"Cyber Security Guide", desc:"Complete beginner guide for ethical hacking", price:"₱199"},
  {id:2, name:"Web Dev Templates", desc:"Ready-to-use HTML/CSS/JS codes", price:"₱299"},
  {id:3, name:"Ethical Toolkit", desc:"Mobile-friendly security tools", price:"₱399"},
  {id:4, name:"Custom Website Design", desc:"Personalized layout & coding", price:"₱499"}
];

// RENDER PRODUCTS
function renderProducts(){
  const list = document.getElementById('productList');
  list.innerHTML = products.map(p => `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <div class="price">${p.price}</div>
      <button class="add-btn" onclick="addToCart(${p.id})">🛒 Add to Cart</button>
    </div>
  `).join('');
}

function renderAdminProducts(){
  const list = document.getElementById('adminProductList');
  list.innerHTML = products.map((p,i) => `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <div class="price">${p.price}</div>
      <button class="btn-delete" style="width:100%;margin-top:.5rem" onclick="deleteProduct(${i})">🗑️ Delete</button>
    </div>
  `).join('');
}

// MODAL CONTROLS
document.getElementById('loginBtn').onclick = ()=> document.getElementById('loginModal').style.display = 'flex';
document.getElementById('registerBtn').onclick = ()=> document.getElementById('registerModal').style.display = 'flex';
document.getElementById('adminBtn').onclick = ()=>{
  document.getElementById('userView').classList.remove('active');
  document.getElementById('adminView').classList.add('active');
  renderAdminProducts();
};
function closeModal(id){ document.getElementById(id).style.display = 'none'; }

// AUTH FUNCTIONS
async function register(){
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  
  if(!name || !email || pass.length < 6) return alert("❌ Fill all fields / Password min 6 characters");

  const {data, error} = await supabase.auth.signUp({
    email: email,
    password: pass,
    data: { full_name: name }
  });

  if(error) alert(error.message);
  else {
    alert("✅ Account created successfully! You can now login.");
    closeModal('registerModal');
  }
}

async function login(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;

  const {data, error} = await supabase.auth.signInWithPassword({email, password:pass});
  if(error) alert(error.message);
  else updateUserUI(data.user);
  closeModal('loginModal');
}

// GOOGLE LOGIN
async function loginWithGoogle(){
  const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
  if(error) alert(error.message);
}

async function logout(){
  await supabase.auth.signOut();
  updateUserUI(null);
}

function updateUserUI(user){
  const status = document.getElementById('userStatus');
  const loginBtn = document.getElementById('loginBtn');
  const regBtn = document.getElementById('registerBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const adminBtn = document.getElementById('adminBtn');

  if(user){
    status.textContent = `👤 ${user.user_metadata.full_name || user.email}`;
    loginBtn.style.display = 'none';
    regBtn.style.display = 'none';
    logoutBtn.style.display = 'block';
    
    // SHOW ADMIN PANEL IF IT'S YOU
    if(user.email === ADMIN_EMAIL){
      adminBtn.classList.remove('hidden');
    } else {
      adminBtn.classList.add('hidden');
    }
  } else {
    status.textContent = "Guest";
    loginBtn.style.display = 'block';
    regBtn.style.display = 'block';
    logoutBtn.style.display = 'none';
    adminBtn.classList.add('hidden');
    // BACK TO USER VIEW
    document.getElementById('userView').classList.add('active');
    document.getElementById('adminView').classList.remove('active');
  }
}

// ADMIN FUNCTIONS
function addProduct(){
  const name = document.getElementById('prodName').value.trim();
  const desc = document.getElementById('prodDesc').value.trim();
  const price = document.getElementById('prodPrice').value.trim();
  
  if(!name || !desc || !price) return alert("❌ Fill all fields");
  
  products.push({
    id: Date.now(),
    name: name,
    desc: desc,
    price: price
  });
  
  alert("✅ Product added!");
  renderProducts();
  renderAdminProducts();
  
  // CLEAR FORM
  document.getElementById('prodName').value = '';
  document.getElementById('prodDesc').value = '';
  document.getElementById('prodPrice').value = '';
}

function deleteProduct(index){
  if(confirm("❓ Delete this product?")){
    products.splice(index,1);
    renderProducts();
    renderAdminProducts();
  }
}

function addToCart(id){
  alert("✅ Added to Cart! Login to proceed with purchase.");
}

// CHECK USER ON LOAD
supabase.auth.onAuthStateChange((event, session)=>{
  updateUserUI(session?.user || null);
});

// INITIALIZE
renderProducts();
document.getElementById('logoutBtn').onclick = logout;
</script>

</body>
</html>
