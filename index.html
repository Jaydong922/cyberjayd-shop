<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberJayd Shop | Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#0b1020;color:#fff;height:100vh;display:flex;align-items:center;justify-content:center}
        .login-box{background:#1a2a50;padding:40px;border-radius:12px;width:90%;max-width:400px;border:2px solid #3b82f6;box-shadow:0 0 25px rgba(59,130,246,0.3)}
        h2{text-align:center;margin-bottom:25px;color:#7dd3fc}
        input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:6px;background:#0f1a35;color:#fff;font-size:16px}
        button{width:100%;padding:12px;background:#00d9ff;color:#000;font-weight:bold;border:none;border-radius:6px;font-size:17px;margin-top:10px;cursor:pointer}
        button:hover{background:#00b8d4}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 CYBERJAYD SHOP</h2>
        <form action="dashboard.html" method="GET">
            <input type="text" name="user" placeholder="Username" required>
            <input type="password" name="pass" placeholder="Password" required>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
